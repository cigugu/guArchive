<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Reference Catalog</title>
<script src="sql-wasm.js"></script>

<style>
body{
  font-family: monospace;
  background:#f5f5f5;
  margin:0;
  padding:16px;
  color:#111;
}
.wrap{
  max-width:1080px;
  margin:0 auto;
}
h1{
  font-size:24px;
  margin:0 0 16px 0;
}
.box{
  background:#fff;
  border:1px solid #222;
  padding:12px;
  margin-bottom:14px;
}
.row{
  margin-bottom:10px;
}
label{
  display:block;
  font-weight:bold;
  margin-bottom:4px;
}
.req{
  margin-left:4px;
}
input, textarea, select{
  width:100%;
  box-sizing:border-box;
  font-family:monospace;
  border:1px solid #999;
  padding:8px;
  background:#fff;
}
textarea{
  min-height:90px;
  resize:vertical;
}
button{
  font-family:monospace;
  border:1px solid #222;
  background:#fff;
  padding:8px 10px;
  cursor:pointer;
  margin:4px 6px 4px 0;
}
button:hover{
  background:#f0f0f0;
}
.small{
  font-size:12px;
  color:#666;
  margin-top:6px;
  line-height:1.5;
}
.hidden{
  display:none;
}
.empty{
  color:#666;
  font-size:12px;
}
.grid2{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}
.inline-tools{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
}
.readonly{
  background:#f1f1f1;
}
.table-wrap{
  overflow-x:auto;
  margin-top:10px;
}
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}
th, td{
  border:1px solid #222;
  padding:8px;
  text-align:left;
  vertical-align:top;
  white-space:nowrap;
}
th{
  background:#f0f0f0;
}
td.title-cell{
  min-width:220px;
  white-space:normal;
}
td.tags-cell{
  min-width:140px;
  white-space:normal;
}
td.time-cell{
  min-width:170px;
}
.group-row td{
  background:#e9e9e9;
  font-weight:bold;
}
.subgroup-row td{
  background:#f7f7f7;
  font-weight:bold;
}
.title-link{
  color:#111;
  text-decoration:underline;
  cursor:pointer;
}
.title-link:hover{
  background:#f0f0f0;
}
.editor-wrap{
  max-width:900px;
  margin:0 auto;
}
@media (max-width: 779px){
  th, td{
    font-size:12px;
    padding:6px;
  }
}
@media (min-width: 780px){
  .grid2{
    grid-template-columns:1fr 1fr;
  }
}
</style>
</head>
<body>
<div id="app" class="wrap">
  <div class="box">
    <div id="state" class="small">engine loading...</div>
  </div>
</div>

<script>
let SQL;
let db;
let l1Options = [];

const DB_STORAGE_KEY = "catalog_db_binary_v1";
const EDIT_ID_KEY = "catalog_open_edit_id";

initSqlJs({
  locateFile: file => file
}).then(function(sql){
  SQL = sql;
  loadDBFromLocalStorage();
  renderApp();
  setState("engine ready");
}).catch(function(err){
  console.error(err);
  setState("engine failed to load");
  alert("Engine failed to load. Please confirm sql-wasm.js and its wasm file are in the same folder.");
});

function setState(text){
  const el = document.getElementById("state");
  if(el) el.innerText = text;
}

function persistDBToLocalStorage(){
  if(!db) return;
  try{
    const data = db.export();
    const arr = Array.from(data);
    localStorage.setItem(DB_STORAGE_KEY, JSON.stringify(arr));
  }catch(err){
    console.error(err);
  }
}

function loadDBFromLocalStorage(){
  try{
    const raw = localStorage.getItem(DB_STORAGE_KEY);
    if(raw){
      const arr = JSON.parse(raw);
      db = new SQL.Database(new Uint8Array(arr));
    }
  }catch(err){
    console.error(err);
  }
}

function ensureDB(){
  if(db) return;
  db = new SQL.Database();
  db.run(`
    CREATE TABLE IF NOT EXISTS items (
      id TEXT PRIMARY KEY,
      title TEXT NOT NULL,
      ownership TEXT NOT NULL,
      relation TEXT NOT NULL,
      type TEXT NOT NULL,
      created_at TEXT NOT NULL,
      cefr TEXT,
      difficulty TEXT,
      status TEXT,
      link TEXT,
      apa TEXT,
      info TEXT,
      notes TEXT,
      tags TEXT
    )
  `);
  persistDBToLocalStorage();
}

function renderApp(){
  const editId = sessionStorage.getItem(EDIT_ID_KEY);
  if(editId){
    renderEditorPage(editId);
  }else{
    renderIndexPage();
  }
}

function closeEditorPage(){
  sessionStorage.removeItem(EDIT_ID_KEY);
  if(window.opener && !window.opener.closed){
    try{
      window.opener.location.reload();
    }catch(err){}
  }
  window.close();
  renderIndexPage();
}

function saveEditor(){
  const payload = {
    id: document.getElementById("edit_id").value.trim(),
    title: document.getElementById("edit_title").value.trim(),
    ownership: document.getElementById("edit_ownership").value,
    relation: document.getElementById("edit_relation").value,
    type: document.getElementById("edit_type").value,
    created_at: document.getElementById("edit_created_at").value.trim(),
    cefr: document.getElementById("edit_cefr").value,
    difficulty: document.getElementById("edit_difficulty").value,
    status: document.getElementById("edit_status").value,
    link: document.getElementById("edit_link").value.trim(),
    apa: document.getElementById("edit_apa").value.trim(),
    info: document.getElementById("edit_info").value.trim(),
    notes: document.getElementById("edit_notes").value.trim(),
    tags: document.getElementById("edit_tags").value.trim()
  };

  if(!payload.title || !payload.id || !payload.ownership || !payload.relation || !payload.type){
    document.getElementById("edit_msg").textContent = "Required fields: Title / ID / Ownership / Relation / Type";
    return;
  }

  try{
    ensureDB();
    db.run(
      `UPDATE items SET
        title = ?,
        ownership = ?,
        relation = ?,
        type = ?,
        created_at = ?,
        cefr = ?,
        difficulty = ?,
        status = ?,
        link = ?,
        apa = ?,
        info = ?,
        notes = ?,
        tags = ?
      WHERE id = ?`,
      [
        payload.title,
        payload.ownership,
        payload.relation,
        payload.type,
        payload.created_at,
        payload.cefr,
        payload.difficulty,
        payload.status,
        payload.link,
        payload.apa,
        payload.info,
        payload.notes,
        payload.tags,
        payload.id
      ]
    );
    persistDBToLocalStorage();
    document.getElementById("edit_msg").textContent = "Saved.";
    if(window.opener && !window.opener.closed){
      try{
        window.opener.location.reload();
      }catch(err){}
    }
  }catch(err){
    console.error(err);
    document.getElementById("edit_msg").textContent = "Save failed.";
  }
}

function attachFileHandler(){
  const fileInput = document.getElementById("file");
  if(!fileInput) return;
  fileInput.onchange = function(){
    const f = this.files[0];
    if(!f) return;

    const r = new FileReader();
    r.onload = function(){
      const data = new Uint8Array(r.result);
      db = new SQL.Database(data);
      persistDBToLocalStorage();
      rebuildL1OptionsFromDB();
      renderList();
      updateID();
    };
    r.readAsArrayBuffer(f);
  };
}

function createDB(){
  ensureDB();
  rebuildL1OptionsFromDB();
  renderList();
  updateID();
}

function exportDB(){
  if(!db){
    alert("No database to download.");
    return;
  }

  const data = db.export();
  const blob = new Blob([data], {type:"application/octet-stream"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "catalog.db";
  a.click();
}

function getAllItems(){
  if(!db) return [];

  const res = db.exec(`
    SELECT
      id, title, ownership, relation, type, created_at,
      cefr, difficulty, status, link, apa, info, notes, tags
    FROM items
  `);

  if(!res.length) return [];

  return res[0].values.map(row => ({
    id: row[0] || "",
    title: row[1] || "",
    ownership: row[2] || "",
    relation: row[3] || "",
    type: row[4] || "",
    created_at: row[5] || "",
    cefr: row[6] || "",
    difficulty: row[7] || "",
    status: row[8] || "",
    link: row[9] || "",
    apa: row[10] || "",
    info: row[11] || "",
    notes: row[12] || "",
    tags: row[13] || ""
  }));
}

function rebuildL1OptionsFromDB(){
  const sel = document.getElementById("l1Select");
  if(!sel) return;

  const items = getAllItems();
  const fromDB = items.map(x => normalizeL1(x.id.split("-")[0] || "")).filter(Boolean);
  l1Options = Array.from(new Set([...l1Options, ...fromDB])).sort();

  sel.innerHTML = "";
  const placeholder = document.createElement("option");
  placeholder.value = "";
  placeholder.textContent = "Add L1 first";
  sel.appendChild(placeholder);

  l1Options.forEach(v => {
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    sel.appendChild(opt);
  });
}

function addL1Option(){
  const input = document.getElementById("newL1");
  if(!input) return;
  const value = normalizeL1(input.value);

  if(!/^[A-Z]{2}$/.test(value)){
    alert("L1 must be two English letters, such as HM");
    return;
  }

  if(!l1Options.includes(value)){
    l1Options.push(value);
    l1Options.sort();
  }

  input.value = "";
  rebuildL1OptionsFromDB();
  document.getElementById("l1Select").value = value;
  onL1SelectChange();
}

function onL1SelectChange(){
  const sel = document.getElementById("l1Select");
  if(!sel) return;

  const l1 = normalizeL1(sel.value);
  const hint = document.getElementById("otHint");
  const idInput = document.getElementById("id");
  const idHint = document.getElementById("idHint");
  const l2 = document.getElementById("l2");
  const l3 = document.getElementById("l3");

  if(!idInput || !l2 || !l3 || !hint || !idHint) return;

  if(l1 === "OT"){
    hint.textContent = "OT is the temporary zone. ID is manual input, for example OT-01.";
    idHint.textContent = "OT uses manual input, for example OT-01.";
    l2.disabled = true;
    l3.disabled = true;
    l2.value = "";
    l3.value = "";
    idInput.readOnly = false;
    idInput.classList.remove("readonly");
    idInput.placeholder = "e.g. OT-01";
    idInput.value = "";
  }else{
    hint.textContent = "";
    idHint.textContent = "Standard format: L1-L2-L3-L4. ID is generated automatically after L1-L3 are complete.";
    l2.disabled = false;
    l3.disabled = false;
    idInput.readOnly = true;
    idInput.classList.add("readonly");
    idInput.placeholder = "e.g. HM-01-01-0001";
  }

  updateID();
}

function nextSerialFor(l1, l2, l3){
  if(!db) return "0001";
  const prefix = `${l1}-${l2}-${l3}-`;
  const items = getAllItems().filter(x => x.id.startsWith(prefix));

  let maxNum = 0;
  items.forEach(item => {
    const parts = item.id.split("-");
    if(parts.length === 4){
      const n = parseInt(parts[3], 10);
      if(!isNaN(n) && n > maxNum) maxNum = n;
    }
  });

  return String(maxNum + 1).padStart(4, "0");
}

function updateID(){
  const l1El = document.getElementById("l1Select");
  const l2El = document.getElementById("l2");
  const l3El = document.getElementById("l3");
  const idInput = document.getElementById("id");
  if(!l1El || !l2El || !l3El || !idInput) return;

  const l1 = normalizeL1(l1El.value);
  const l2 = l2El.value.trim();
  const l3 = l3El.value.trim();

  if(!l1){
    idInput.value = "";
    return;
  }

  if(l1 === "OT"){
    return;
  }

  if(!/^\d{2}$/.test(l2) || !/^\d{2}$/.test(l3)){
    idInput.value = "";
    return;
  }

  idInput.value = `${l1}-${l2}-${l3}-${nextSerialFor(l1, l2, l3)}`;
}

function isValidID(id){
  return /^[A-Z]{2}-\d{2}-\d{2}-\d{4}$/.test(id) || /^OT-\d{2}$/.test(id);
}

function add(){
  ensureDB();

  const title = document.getElementById("title").value.trim();
  const id = document.getElementById("id").value.trim().toUpperCase();
  const l1 = normalizeL1(document.getElementById("l1Select").value);
  const l2 = document.getElementById("l2").value.trim();
  const l3 = document.getElementById("l3").value.trim();
  const ownership = document.getElementById("ownership").value;
  const relation = document.getElementById("relation").value;
  const type = document.getElementById("type").value;
  const cefr = document.getElementById("cefr").value;
  const difficulty = document.getElementById("difficulty").value;
  const status = document.getElementById("status").value;
  const link = document.getElementById("link").value.trim();
  const apa = document.getElementById("apa").value.trim();
  const info = document.getElementById("info").value.trim();
  const notes = document.getElementById("notes").value.trim();
  const tags = document.getElementById("tags").value.trim();

  if(!title || !id || !ownership || !relation || !type){
    alert("Required fields: Title / ID / Ownership / Relation / Type");
    return;
  }

  if(!l1){
    alert("Please select or add L1 first.");
    return;
  }

  if(l1 !== "OT"){
    if(!/^\d{2}$/.test(l2)){
      alert("L2 must be two digits, such as 01");
      return;
    }
    if(!/^\d{2}$/.test(l3)){
      alert("L3 must be two digits, such as 01");
      return;
    }
  }

  if(!isValidID(id)){
    alert("ID must be in the format HM-01-01-0001, or OT-01 for the temporary zone.");
    return;
  }

  const created_at = nowText();

  try{
    db.run(
      `INSERT INTO items (
        id, title, ownership, relation, type, created_at,
        cefr, difficulty, status, link, apa, info, notes, tags
      ) VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?)`,
      [id, title, ownership, relation, type, created_at, cefr, difficulty, status, link, apa, info, notes, tags]
    );
    persistDBToLocalStorage();
  }catch(err){
    alert("Insert failed. The ID may already exist.\n\n" + err.message);
    return;
  }

  clearFormKeepStructure();
  rebuildL1OptionsFromDB();
  renderList();
  updateID();
}

function clearFormKeepStructure(){
  const ids = ["title","ownership","relation","type","cefr","difficulty","status","link","apa","info","notes","tags"];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if(el) el.value = "";
  });

  const l1 = document.getElementById("l1Select");
  const id = document.getElementById("id");
  const l2 = document.getElementById("l2");
  const l3 = document.getElementById("l3");

  if(!l1 || !id || !l2 || !l3) return;

  if(l1.value === "OT"){
    id.value = "";
  }else{
    l2.value = "";
    l3.value = "";
    id.value = "";
  }
}

function parseIDForSort(id){
  if(/^OT-\d{2}$/.test(id)){
    const n = parseInt(id.split("-")[1], 10);
    return { group:-1, l1:"OT", l2:0, l3:0, l4:isNaN(n)?0:n };
  }

  const m = id.match(/^([A-Z]{2})-(\d{2})-(\d{2})-(\d{4})$/);
  if(m){
    return {
      group:0,
      l1:m[1],
      l2:parseInt(m[2],10),
      l3:parseInt(m[3],10),
      l4:parseInt(m[4],10)
    };
  }

  return { group:9, l1:id, l2:0, l3:0, l4:0 };
}

function sortItemsByID(items){
  return items.sort((a,b)=>{
    const A = parseIDForSort(a.id);
    const B = parseIDForSort(b.id);
    if(A.group !== B.group) return A.group - B.group;
    if(A.l1 !== B.l1) return A.l1.localeCompare(B.l1);
    if(A.l2 !== B.l2) return A.l2 - B.l2;
    if(A.l3 !== B.l3) return A.l3 - B.l3;
    if(A.l4 !== B.l4) return A.l4 - B.l4;
    return a.title.localeCompare(b.title);
  });
}

function getGroupKey(item){
  if(/^OT-\d{2}$/.test(item.id)){
    return { l1:"OT", l2:null, label1:"OT", label2:null };
  }

  const m = item.id.match(/^([A-Z]{2})-(\d{2})-(\d{2})-(\d{4})$/);
  if(m){
    return {
      l1:m[1],
      l2:m[2],
      label1:m[1],
      label2:`${m[1]}-${m[2]}`
    };
  }

  return { l1:"OTHER", l2:null, label1:"OTHER", label2:null };
}

function renderList(){
  const list = document.getElementById("list");
  if(!list) return;

  if(!db){
    list.innerHTML = '<div class="small">No database loaded.</div>';
    return;
  }

  let items = getAllItems();
  const qEl = document.getElementById("search");
  const q = qEl ? qEl.value.toLowerCase().trim() : "";

  if(q){
    items = items.filter(item => {
      const text = [item.title, item.id, item.tags, item.info, item.notes, item.apa].join(" ").toLowerCase();
      return text.includes(q);
    });
  }

  items = sortItemsByID(items);

  if(!items.length){
    list.innerHTML = '<div class="empty">No result.</div>';
    return;
  }

  let html = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>ID</th>
            <th>Tags</th>
            <th>Creation time</th>
          </tr>
        </thead>
        <tbody>
  `;

  let currentL1 = null;
  let currentL2 = null;

  items.forEach(item => {
    const g = getGroupKey(item);

    if(g.l1 !== currentL1){
      currentL1 = g.l1;
      currentL2 = null;
      html += `<tr class="group-row"><td colspan="4">${escapeHtml(g.label1)}</td></tr>`;
    }

    if(g.label2 && g.l2 !== currentL2){
      currentL2 = g.l2;
      html += `<tr class="subgroup-row"><td colspan="4">${escapeHtml(g.label2)}</td></tr>`;
    }

    html += `
      <tr>
        <td class="title-cell">
          <span class="title-link" onclick="openEditor(${JSON.stringify(item.id)})">${escapeHtml(item.title || "")}</span>
        </td>
        <td>${escapeHtml(item.id || "")}</td>
        <td class="tags-cell">${escapeHtml(item.tags || "")}</td>
        <td class="time-cell">${escapeHtml(item.created_at || "")}</td>
      </tr>
    `;
  });

  html += `</tbody></table></div>`;
  list.innerHTML = html;
}

function openEditor(id){
  sessionStorage.setItem(EDIT_ID_KEY, id);
  const url = location.pathname + location.search + location.hash;
  const win = window.open(url, "_blank");
  if(!win){
    alert("New tab was blocked by the browser. Please allow pop-ups for this site.");
  }
}

function escapeHtml(str){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function escapeAttr(str){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/"/g,"&quot;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}
