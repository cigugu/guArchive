<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>地獄級文獻管理系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
    <style>
        body { font-family: monospace; background: #e0e0e0; padding: 20px; color: #333; }
        .container { display: flex; gap: 20px; }
        .editor { background: #fff; padding: 15px; border: 2px solid #000; width: 400px; }
        .viewer { flex-grow: 1; background: #fff; padding: 15px; border: 2px solid #000; overflow-x: auto; }
        input, select, textarea { width: 100%; margin-bottom: 10px; font-family: monospace; }
        label { font-weight: bold; font-size: 12px; display: block; margin-top: 5px; }
        button { cursor: pointer; margin-top: 10px; width: 100%; padding: 5px; background: #ddd; border: 1px solid #000; }
        button:hover { background: #bbb; }
        table { border-collapse: collapse; width: 100%; font-size: 12px; }
        th, td { border: 1px solid #000; padding: 4px; text-align: left; }
        th { background: #eee; }
        .status-bar { background: #000; color: #fff; padding: 5px; margin-bottom: 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="status-bar">STATUS: <span id="db-state">等待載入資料庫...</span></div>

<div class="container">
    <div class="editor">
        <label>1. 載入/存檔</label>
        <input type="file" id="dbfile" accept=".db">
        <button onclick="exportDB()" style="background: #ffcccc;">下載更新後的 .db</button>
        <hr>
        
        <label>標題</label>
        <input type="text" id="title" placeholder="在此輸入標題">
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
            <div>
                <label>Ownership</label>
                <select id="ownership">
                    <option value="mine">mine</option><option value="other">other</option>
                    <option value="collaborative">collaborative</option><option value="unknown">unknown</option>
                </select>
                <label>Relation</label>
                <select id="relation">
                    <option value="general">general</option><option value="commissioned">commissioned</option>
                    <option value="personal">personal</option><option value="work">work</option>
                </select>
                <label>Type</label>
                <select id="item_type">
                    <option value="work">work</option><option value="tutorial">tutorial</option>
                    <option value="reference">reference</option><option value="note">note</option>
                </select>
            </div>
            <div>
                <label>CEFR</label>
                <select id="cefr">
                    <option value="A1">A1</option><option value="A2">A2</option><option value="B1">B1</option>
                    <option value="B2">B2</option><option value="C1">C1</option><option value="C2">C2</option>
                </select>
                <label>Difficulty</label>
                <select id="difficulty">
                    <option value="beginner">beginner</option><option value="intermediate">intermediate</option>
                    <option value="advanced">advanced</option>
                </select>
                <label>Status</label>
                <select id="status">
                    <option value="planned">planned</option><option value="in_progress">in_progress</option>
                    <option value="completed">completed</option><option value="abandoned">abandoned</option>
                </select>
            </div>
        </div>

        <label>Links (雲端連結)</label>
        <input type="text" id="links">
        <label>APA Style</label>
        <textarea id="apa_style" rows="2"></textarea>
        <label>Info / Notes / Tags</label>
        <textarea id="notes" rows="4" placeholder="#tags..."></textarea>
        
        <button onclick="addEntry()" style="background: #ccffcc;">🔥 存入記憶體資料庫</button>
    </div>

    <div class="viewer">
        <input type="text" id="search" placeholder="搜尋標題或內容..." oninput="renderTable()">
        <div id="table-container">載入資料庫後將在此顯示內容</div>
    </div>
</div>

<script>
    let db;
    const SQL_CONFIG = { locateFile: filename => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${filename}` };

    // 初始化/讀取檔案
    document.getElementById('dbfile').onchange = function() {
        const f = this.files[0];
        const r = new FileReader();
        r.onload = function() {
            initSqljs(SQL_CONFIG).then(function(SQL) {
                const Uints = new Uint8Array(r.result);
                db = new SQL.Database(Uints);
                document.getElementById('db-state').innerText = "資料庫已掛載: " + f.name;
                renderTable();
            });
        }
        r.readAsArrayBuffer(f);
    };

    function addEntry() {
        if(!db) return alert("請先載入 .db 檔案");
        const vals = [
            document.getElementById('title').value,
            document.getElementById('ownership').value,
            document.getElementById('relation').value,
            document.getElementById('item_type').value,
            document.getElementById('cefr').value,
            document.getElementById('difficulty').value,
            document.getElementById('status').value,
            document.getElementById('links').value,
            document.getElementById('apa_style').value,
            document.getElementById('notes').value
        ];
        
        try {
            db.run(`INSERT INTO literature (title, ownership, relation, item_type, cefr, difficulty, status, links, apa_style, notes) 
                    VALUES (?,?,?,?,?,?,?,?,?,?)`, vals);
            renderTable();
            alert("成功存入記憶體！");
        } catch(e) {
            alert("錯誤: " + e.message + "\n(請確認資料表結構是否正確)");
        }
    }

    function renderTable() {
        if(!db) return;
        const term = document.getElementById('search').value;
        const res = db.exec(`SELECT id, title, cefr, status, notes FROM literature WHERE title LIKE '%${term}%' OR notes LIKE '%${term}%' ORDER BY id DESC`);
        
        let html = "<table><tr><th>ID</th><th>標題</th><th>CEFR</th><th>狀態</th><th>筆記</th></tr>";
        if (res.length > 0) {
            res[0].values.forEach(row => {
                html += `<tr><td>${row[0]}</td><td><b>${row[1]}</b></td><td>${row[2]}</td><td>${row[3]}</td><td>${row[4].substring(0,30)}...</td></tr>`;
            });
        }
        html += "</table>";
        document.getElementById('table-container').innerHTML = html;
    }

    function exportDB() {
        if(!db) return;
        const data = db.export();
        const blob = new Blob([data]);
        const a = document.createElement("a");
        a.href = window.URL.createObjectURL(blob);
        a.download = "literature.db";
        a.click();
    }
</script>

</body>
</html>
