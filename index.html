<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地獄級文獻管理系統 - 穩定版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
    <style>
        body { font-family: monospace; background: #e0e0e0; padding: 20px; color: #333; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; }
        .editor { background: #fff; padding: 15px; border: 2px solid #000; width: 400px; }
        .viewer { flex-grow: 1; background: #fff; padding: 15px; border: 2px solid #000; min-width: 300px; }
        input, select, textarea { width: 100%; margin-bottom: 10px; font-family: monospace; box-sizing: border-box; }
        label { font-weight: bold; font-size: 12px; display: block; margin-top: 5px; }
        button { cursor: pointer; margin-top: 10px; width: 100%; padding: 10px; background: #ddd; border: 2px solid #000; font-weight: bold; }
        button:hover { background: #bbb; }
        button:disabled { background: #eee; color: #999; cursor: not-allowed; }
        table { border-collapse: collapse; width: 100%; font-size: 12px; margin-top: 10px; }
        th, td { border: 1px solid #000; padding: 6px; text-align: left; }
        th { background: #eee; }
        .status-bar { background: #000; color: #fff; padding: 10px; margin-bottom: 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="status-bar">STATUS: <span id="db-state">🔴 正在連接雲端引擎...</span></div>

<div class="container">
    <div class="editor">
        <label>1. 初始化 / 載入</label>
        <button id="btn-create" onclick="createNewDB()" disabled>✨ 點我建立全新資料庫檔案</button>
        <input type="file" id="dbfile" accept=".db">
        <hr>
        <label>2. 輸入資料</label>
        <input type="text" id="title" placeholder="在此輸入標題">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
                <label>Ownership</label>
                <select id="ownership"><option>mine</option><option>other</option><option>collaborative</option></select>
                <label>Relation</label>
                <select id="relation"><option>general</option><option>work</option><option>personal</option></select>
            </div>
            <div>
                <label>CEFR</label>
                <select id="cefr"><option>A1</option><option>A2</option><option>B1</option><option>B2</option><option>C1</option><option>C2</option></select>
                <label>Status</label>
                <select id="status"><option>planned</option><option>in_progress</option><option>completed</option></select>
            </div>
        </div>
        <label>Links</label>
        <input type="text" id="links">
        <label>Notes</label>
        <textarea id="notes" rows="4"></textarea>

        <button id="btn-add" onclick="addEntry()" style="background: #ccffcc;" disabled>🔥 存入記憶體資料庫</button>
        <button id="btn-export" onclick="exportDB()" style="background: #ffcccc;" disabled>💾 下載更新後的 .db</button>
    </div>

    <div class="viewer">
        <input type="text" id="search" placeholder="搜尋標題..." oninput="renderTable()">
        <div id="table-container">引擎就緒後，載入資料庫即可顯示內容</div>
    </div>
</div>

<script>
    let db;
    // 強制指定 WASM 檔案的路徑
    const SQL_CONFIG = { 
        locateFile: filename => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${filename}` 
    };

    // 啟動引擎
    window.onload = function() {
        if (typeof initSqljs === 'function') {
            initSqljs(SQL_CONFIG).then(function(SQL) {
                window.SQL = SQL;
                document.getElementById('db-state').innerText = "🟢 引擎已就緒，請建立或載入資料庫";
                document.getElementById('btn-create').disabled = false;
                document.getElementById('btn-add').disabled = false;
                document.getElementById('btn-export').disabled = false;
            }).catch(e => {
                document.getElementById('db-state').innerText = "❌ 引擎啟動失敗: " + e;
            });
        } else {
            document.getElementById('db-state').innerText = "❌ 無法下載引擎，請確認網路或重新整理";
        }
    };

    function createNewDB() {
        db = new window.SQL.Database();
        db.run(`CREATE TABLE literature (id INTEGER PRIMARY KEY, title TEXT, ownership TEXT, relation TEXT, cefr TEXT, status TEXT, links TEXT, notes TEXT)`);
        document.getElementById('db-state').innerText = "✅ 已建立全新資料庫";
        renderTable();
    }

    document.getElementById('dbfile').onchange = function() {
        const f = this.files[0];
        const r = new FileReader();
        r.onload = function() {
            const Uints = new Uint8Array(r.result);
            db = new window.SQL.Database(Uints);
            document.getElementById('db-state').innerText = "✅ 已掛載: " + f.name;
            renderTable();
        }
        r.readAsArrayBuffer(f);
    };

    function addEntry() {
        if(!db) return alert("請先建立或載入資料庫！");
        const vals = [
            document.getElementById('title').value || "未命名",
            document.getElementById('ownership').value,
            document.getElementById('relation').value,
            document.getElementById('cefr').value,
            document.getElementById('status').value,
            document.getElementById('links').value,
            document.getElementById('notes').value
        ];
        db.run("INSERT INTO literature (title, ownership, relation, cefr, status, links, notes) VALUES (?,?,?,?,?,?,?)", vals);
        renderTable();
        alert("已成功存入記憶體！");
    }

    function renderTable() {
        if(!db) return;
        try {
            const res = db.exec("SELECT * FROM literature ORDER BY id DESC");
            let html = "<table><tr><th>ID</th><th>標題</th><th>狀態</th><th>筆記</th></tr>";
            if (res.length > 0) {
                res[0].values.forEach(row => {
                    html += `<tr><td>${row[0]}</td><td>${row[1]}</td><td>${row[5]}</td><td>${row[7]}</td></tr>`;
                });
            }
            html += "</table>";
            document.getElementById('table-container').innerHTML = html;
        } catch(e) {
            console.log("資料表可能尚未建立");
        }
    }

    function exportDB() {
        if(!db) return;
        const data = db.export();
        const blob = new Blob([data]);
        const a = document.createElement("a");
        a.href = window.URL.createObjectURL(blob);
        a.download = "literature.db";
        a.click();
    }
</script>
</body>
</html>
