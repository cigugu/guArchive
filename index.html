<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Reference Catalog Test</title>

<script src="sql-wasm.js"></script>

<style>

body{
font-family:monospace;
background:#f5f5f5;
padding:30px;
}

h1{
margin-bottom:10px;
}

.box{
background:white;
padding:15px;
border:2px solid black;
margin-bottom:20px;
}

input,textarea{
width:100%;
margin:5px 0;
font-family:monospace;
}

button{
padding:8px;
margin-top:5px;
cursor:pointer;
}

table{
border-collapse:collapse;
width:100%;
margin-top:10px;
}

td,th{
border:1px solid black;
padding:5px;
}

</style>
</head>

<body>

<h1>Personal Reference Catalog (test)</h1>

<div class="box">

<b>Database</b><br>

<button onclick="createDB()">Create new DB</button>

<input type="file" id="file">

<button onclick="exportDB()">Download DB</button>

<div id="state">engine loading...</div>

</div>

<div class="box">

<b>Add entry</b>

<input id="id" placeholder="ID (ex: WR-01-02-0042)">
<input id="title" placeholder="title">
<input id="link" placeholder="link">
<input id="tag" placeholder="tag (optional)">
<textarea id="notes" placeholder="notes"></textarea>

<button onclick="add()">Add</button>

</div>

<div class="box">

<b>Search</b>

<input id="search" placeholder="keyword search" oninput="render()">

<div id="table"></div>

</div>

<script>

let SQL
let db

initSqlJs({
locateFile:file=>file
}).then(function(sql){

SQL = sql

document.getElementById("state").innerText="engine ready"

})

function createDB(){

db = new SQL.Database()

db.run(`
CREATE TABLE items(
id TEXT PRIMARY KEY,
title TEXT,
link TEXT,
tag TEXT,
notes TEXT
)
`)

render()

}

document.getElementById("file").onchange=function(){

let f=this.files[0]

let r=new FileReader()

r.onload=function(){

let data=new Uint8Array(r.result)

db=new SQL.Database(data)

render()

}

r.readAsArrayBuffer(f)

}

function add(){

if(!db){
alert("create db first")
return
}

let id=document.getElementById("id").value
let title=document.getElementById("title").value
let link=document.getElementById("link").value
let tag=document.getElementById("tag").value
let notes=document.getElementById("notes").value

db.run(
"INSERT INTO items VALUES (?,?,?,?,?)",
[id,title,link,tag,notes]
)

render()

}

function render(){

if(!db)return

let q=document.getElementById("search").value.toLowerCase()

let res=db.exec("SELECT * FROM items")

let html="<table>"
html+="<tr><th>ID</th><th>Title</th><th>Tag</th><th>Link</th></tr>"

if(res.length){

res[0].values.forEach(row=>{

let text=(row.join(" ")).toLowerCase()

if(!text.includes(q))return

html+=`
<tr>
<td>${row[0]}</td>
<td>${row[1]}</td>
<td>${row[3]}</td>
<td><a href="${row[2]}" target="_blank">open</a></td>
</tr>
`

})

}

html+="</table>"

document.getElementById("table").innerHTML=html

}

function exportDB(){

if(!db)return

let data=db.export()

let blob=new Blob([data])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="catalog.db"

a.click()

}

</script>

</body>
</html>
