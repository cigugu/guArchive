<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Personal Reference Catalog</title>
<script src="sql-wasm.js"></script>

<style>
body{
  font-family: monospace;
  background:#f5f5f5;
  margin:0;
  padding:20px;
  color:#111;
}

h1{
  font-size:24px;
  margin:0 0 20px 0;
}

.toolbar,
.searchbox,
.listbox,
.detailbox,
.formbox{
  background:#fff;
  border:1px solid #222;
  padding:12px;
  margin-bottom:14px;
}

button{
  font-family:monospace;
  padding:6px 10px;
  cursor:pointer;
  background:#fff;
  border:1px solid #222;
}

input, textarea{
  width:100%;
  box-sizing:border-box;
  font-family:monospace;
  margin-top:8px;
  padding:6px;
  border:1px solid #999;
  background:#fff;
}

textarea{
  min-height:100px;
  resize:vertical;
}

.small{
  font-size:12px;
  color:#666;
  margin-top:8px;
}

.item{
  padding:10px 8px;
  border-bottom:1px solid #ddd;
  cursor:pointer;
}

.item:hover{
  background:#f0f0f0;
}

.item-title{
  font-weight:bold;
}

.item-meta{
  font-size:12px;
  color:#666;
  margin-top:4px;
}

.hidden{
  display:none;
}

.detail-row{
  margin-bottom:10px;
}

.detail-label{
  font-weight:bold;
  display:block;
  margin-bottom:3px;
}

a{
  color:#111;
}
</style>
</head>

<body>

<h1>Personal Reference Catalog</h1>

<div class="toolbar">
  <button onclick="createDB()">Create DB</button>
  <input type="file" id="file">
  <button onclick="exportDB()">Download DB</button>
  <button onclick="toggleForm()">Add Entry</button>
  <div id="state" class="small">engine loading...</div>
</div>

<div id="formBox" class="formbox hidden">
  <div><b>New Entry</b></div>
  <input id="id" placeholder="ID">
  <input id="title" placeholder="Title">
  <input id="link" placeholder="Link">
  <input id="tag" placeholder="Tag">
  <textarea id="notes" placeholder="Notes"></textarea>
  <button onclick="add()">Save</button>
</div>

<div class="searchbox">
  <input id="search" placeholder="Search title / id / tag" oninput="renderList()">
</div>

<div class="listbox">
  <div><b>Index</b></div>
  <div id="list"></div>
</div>

<div class="detailbox">
  <div><b>Detail</b></div>
  <div id="detail" class="small">Select an entry.</div>
</div>

<script>
let SQL;
let db;

initSqlJs({
  locateFile:file=>file
}).then(function(sql){
  SQL = sql;
  document.getElementById("state").innerText = "engine ready";
});

function createDB(){
  db = new SQL.Database();
  db.run(`
    CREATE TABLE items(
      id TEXT PRIMARY KEY,
      title TEXT,
      link TEXT,
      tag TEXT,
      notes TEXT
    )
  `);
  renderList();
  clearDetail();
}

document.getElementById("file").onchange = function(){
  let f = this.files[0];
  if(!f) return;

  let r = new FileReader();
  r.onload = function(){
    let data = new Uint8Array(r.result);
    db = new SQL.Database(data);
    renderList();
    clearDetail();
  };
  r.readAsArrayBuffer(f);
};

function toggleForm(){
  document.getElementById("formBox").classList.toggle("hidden");
}

function add(){
  if(!db){
    alert("create db first");
    return;
  }

  let id = document.getElementById("id").value.trim();
  let title = document.getElementById("title").value.trim();
  let link = document.getElementById("link").value.trim();
  let tag = document.getElementById("tag").value.trim();
  let notes = document.getElementById("notes").value.trim();

  if(!id || !title){
    alert("ID and Title are required");
    return;
  }

  db.run(
    "INSERT INTO items VALUES (?,?,?,?,?)",
    [id, title, link, tag, notes]
  );

  document.getElementById("id").value = "";
  document.getElementById("title").value = "";
  document.getElementById("link").value = "";
  document.getElementById("tag").value = "";
  document.getElementById("notes").value = "";

  renderList();
}

function getAllItems(){
  if(!db) return [];

  let res = db.exec("SELECT * FROM items ORDER BY id ASC");
  if(!res.length) return [];

  return res[0].values.map(row => ({
    id: row[0],
    title: row[1],
    link: row[2],
    tag: row[3],
    notes: row[4]
  }));
}

function renderList(){
  if(!db){
    document.getElementById("list").innerHTML = '<div class="small">No database loaded.</div>';
    return;
  }

  let q = document.getElementById("search").value.toLowerCase().trim();
  let items = getAllItems();

  if(q){
    items = items.filter(item => {
      let text = [item.id, item.title, item.tag, item.notes, item.link].join(" ").toLowerCase();
      return text.includes(q);
    });
  }

  if(!items.length){
    document.getElementById("list").innerHTML = '<div class="small">No result.</div>';
    return;
  }

  let html = "";
  items.forEach(item => {
    html += `
      <div class="item" onclick="showDetail('${escapeHtml(item.id)}')">
        <div class="item-title">${escapeHtml(item.title || "(untitled)")}</div>
        <div class="item-meta">${escapeHtml(item.id)}${item.tag ? " / " + escapeHtml(item.tag) : ""}</div>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

function showDetail(id){
  let items = getAllItems();
  let item = items.find(x => x.id === id);
  if(!item) return;

  document.getElementById("detail").innerHTML = `
    <div class="detail-row">
      <span class="detail-label">Title</span>
      <div>${escapeHtml(item.title || "")}</div>
    </div>

    <div class="detail-row">
      <span class="detail-label">ID</span>
      <div>${escapeHtml(item.id || "")}</div>
    </div>

    <div class="detail-row">
      <span class="detail-label">Tag</span>
      <div>${escapeHtml(item.tag || "")}</div>
    </div>

    <div class="detail-row">
      <span class="detail-label">Link</span>
      <div>${item.link ? `<a href="${escapeAttr(item.link)}" target="_blank">open</a>` : ""}</div>
    </div>

    <div class="detail-row">
      <span class="detail-label">Notes</span>
      <div>${escapeHtml(item.notes || "").replace(/\n/g,"<br>")}</div>
    </div>
  `;
}

function clearDetail(){
  document.getElementById("detail").innerHTML = 'Select an entry.';
}

function exportDB(){
  if(!db) return;

  let data = db.export();
  let blob = new Blob([data], {type:"application/octet-stream"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "catalog.db";
  a.click();
}

function escapeHtml(str){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function escapeAttr(str){
  return String(str).replace(/"/g, "&quot;");
}
</script>

</body>
</html>
