<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Reference Catalog</title>
<script src="sql-wasm.js"></script>

<style>
body{
  font-family: monospace;
  background:#f5f5f5;
  margin:0;
  padding:16px;
  color:#111;
}
.wrap{
  max-width:1080px;
  margin:0 auto;
}
h1{
  font-size:24px;
  margin:0 0 16px 0;
}
.box{
  background:#fff;
  border:1px solid #222;
  padding:12px;
  margin-bottom:14px;
}
.row{
  margin-bottom:10px;
}
label{
  display:block;
  font-weight:bold;
  margin-bottom:4px;
}
.req{
  margin-left:4px;
}
input, textarea, select{
  width:100%;
  box-sizing:border-box;
  font-family:monospace;
  border:1px solid #999;
  padding:8px;
  background:#fff;
}
textarea{
  min-height:90px;
  resize:vertical;
}
button{
  font-family:monospace;
  border:1px solid #222;
  background:#fff;
  padding:8px 10px;
  cursor:pointer;
  margin:4px 6px 4px 0;
}
button:hover{
  background:#f0f0f0;
}
.small{
  font-size:12px;
  color:#666;
  margin-top:6px;
  line-height:1.5;
}
.hidden{
  display:none;
}
.empty{
  color:#666;
  font-size:12px;
}
.grid2{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}
.inline-tools{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
}
.readonly{
  background:#f1f1f1;
}
.table-wrap{
  overflow-x:auto;
  margin-top:10px;
}
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}
th, td{
  border:1px solid #222;
  padding:8px;
  text-align:left;
  vertical-align:top;
  white-space:nowrap;
}
th{
  background:#f0f0f0;
}
td.title-cell{
  min-width:220px;
  white-space:normal;
}
td.tags-cell{
  min-width:140px;
  white-space:normal;
}
td.time-cell{
  min-width:170px;
}
.group-row td{
  background:#e9e9e9;
  font-weight:bold;
}
.subgroup-row td{
  background:#f7f7f7;
  font-weight:bold;
}
.title-link{
  color:#111;
  text-decoration:underline;
  cursor:pointer;
}
.title-link:hover{
  background:#f0f0f0;
}
@media (max-width: 779px){
  th, td{
    font-size:12px;
    padding:6px;
  }
}
@media (min-width: 780px){
  .grid2{
    grid-template-columns:1fr 1fr;
  }
}
</style>
</head>
<body>
<div class="wrap">

<h1>Personal Reference Catalog</h1>

<div class="box">
  <div><b>Database</b></div>
  <div style="margin-top:8px;">
    <button onclick="createDB()">Create new DB</button>
    <input type="file" id="file" style="margin-top:8px;">
    <button onclick="exportDB()">Download DB</button>
    <button onclick="toggleForm()">Add entry</button>
  </div>
  <div id="state" class="small">engine loading...</div>
</div>

<div id="formBox" class="box hidden">
  <div><b>New Entry</b></div>

  <div class="row">
    <label>Title<span class="req">*</span></label>
    <input id="title" placeholder="Enter title here">
  </div>

  <div class="grid2">
    <div class="row">
      <label>Field</label>
      <select id="l1Select" onchange="onL1SelectChange()">
        <option value="">Add L1 first</option>
      </select>
      <div class="small">L1 must be two English letters, such as HM, LG, WR. OT is the temporary zone exception.</div>
    </div>

    <div class="row">
      <label>Add new field</label>
      <div class="inline-tools">
        <input id="newL1" placeholder="e.g. HM" maxlength="2" style="flex:1;">
        <button type="button" onclick="addL1Option()">Add L1</button>
      </div>
    </div>
  </div>

  <div id="otHint" class="small"></div>

  <div class="grid2">
    <div class="row">
      <label>Category</label>
      <input id="l2" placeholder="Two digits, e.g. 01" maxlength="2" oninput="updateID()">
    </div>

    <div class="row">
      <label>Topic</label>
      <input id="l3" placeholder="Two digits, e.g. 01" maxlength="2" oninput="updateID()">
    </div>
  </div>

  <div class="row">
    <label>ID<span class="req">*</span></label>
    <input id="id" placeholder="e.g. HM-01-01-0001 or OT-01">
    <div id="idHint" class="small">Standard format: L1-L2-L3-L4. OT is manual input, e.g. OT-01.</div>
  </div>

  <div class="grid2">
    <div class="row">
      <label>Ownership<span class="req">*</span></label>
      <select id="ownership">
        <option value="">Select</option>
        <option value="mine">mine</option>
        <option value="other">other</option>
        <option value="collaborative">collaborative</option>
        <option value="unknown">unknown</option>
      </select>
    </div>

    <div class="row">
      <label>Relation<span class="req">*</span></label>
      <select id="relation">
        <option value="">Select</option>
        <option value="commissioned">commissioned</option>
        <option value="general">general</option>
        <option value="personal">personal</option>
        <option value="work">work</option>
      </select>
    </div>
  </div>

  <div class="grid2">
    <div class="row">
      <label>Type<span class="req">*</span></label>
      <select id="type">
        <option value="">Select</option>
        <option value="work">work</option>
        <option value="tutorial">tutorial</option>
        <option value="reference">reference</option>
        <option value="note">note</option>
      </select>
    </div>

    <div class="row">
      <label>CEFR</label>
      <select id="cefr">
        <option value="">Blank</option>
        <option value="A1">A1</option>
        <option value="A2">A2</option>
        <option value="B1">B1</option>
        <option value="B2">B2</option>
        <option value="C1">C1</option>
        <option value="C2">C2</option>
      </select>
    </div>
  </div>

  <div class="grid2">
    <div class="row">
      <label>Difficulty</label>
      <select id="difficulty">
        <option value="">Blank</option>
        <option value="beginner">beginner</option>
        <option value="intermediate">intermediate</option>
        <option value="advanced">advanced</option>
      </select>
    </div>

    <div class="row">
      <label>Status</label>
      <select id="status">
        <option value="">Blank</option>
        <option value="planned">planned</option>
        <option value="in_progress">in_progress</option>
        <option value="completed">completed</option>
        <option value="abandoned">abandoned</option>
      </select>
    </div>
  </div>

  <div class="row">
    <label>Links</label>
    <input id="link" placeholder="Cloud folder link / URL">
  </div>

  <div class="row">
    <label>APA style</label>
    <textarea id="apa" placeholder="APA style"></textarea>
  </div>

  <div class="row">
    <label>Info</label>
    <textarea id="info" placeholder="Info"></textarea>
  </div>

  <div class="row">
    <label>Notes</label>
    <textarea id="notes" placeholder="Notes"></textarea>
  </div>

  <div class="row">
    <label>Tags</label>
    <input id="tags" placeholder="#tag1 #tag2">
  </div>

  <button onclick="add()">Save</button>
</div>

<div class="box">
  <div><b>Search</b></div>
  <input id="search" placeholder="Search title / id / tags / info / notes / apa" oninput="renderList()" style="margin-top:8px;">
</div>

<div class="box">
  <div><b>Index</b></div>
  <div id="list" class="small">No database loaded.</div>
</div>

<div class="box">
  <div><b>Edit Entry</b></div>
  <div id="editorArea" class="small">Select a title to view and edit.</div>
</div>

</div>

<script>
let SQL;
let db;
let l1Options = [];
let currentEditId = null;

initSqlJs({
  locateFile: file => "./" + file
}).then(function(sql){
  SQL = sql;
  setState("engine ready");
}).catch(function(err){
  console.error(err);
  setState("engine failed");
  alert("Engine failed to load. Please confirm sql-wasm.js and sql-wasm.wasm are both in the same folder.");
});

function setState(text){
  const el = document.getElementById("state");
  if(el) el.innerText = text;
}

function createDB(){
  db = new SQL.Database();
  db.run(`
    CREATE TABLE IF NOT EXISTS items (
      id TEXT PRIMARY KEY,
      title TEXT NOT NULL,
      ownership TEXT NOT NULL,
      relation TEXT NOT NULL,
      type TEXT NOT NULL,
      created_at TEXT NOT NULL,
      cefr TEXT,
      difficulty TEXT,
      status TEXT,
      link TEXT,
      apa TEXT,
      info TEXT,
      notes TEXT,
      tags TEXT
    )
  `);
  rebuildL1OptionsFromDB();
  renderList();
  clearEditor();
  updateID();
}

document.getElementById("file").onchange = function(){
  const f = this.files[0];
  if(!f) return;

  const r = new FileReader();
  r.onload = function(){
    const data = new Uint8Array(r.result);
    db = new SQL.Database(data);
    rebuildL1OptionsFromDB();
    renderList();
    clearEditor();
    updateID();
  };
  r.readAsArrayBuffer(f);
};

function toggleForm(){
  document.getElementById("formBox").classList.toggle("hidden");
  updateID();
}

function normalizeL1(v){
  return String(v || "").trim().toUpperCase();
}

function rebuildL1OptionsFromDB(selectedValue = ""){
  const sel = document.getElementById("l1Select");
  if(!sel) return;

  const items = getAllItems();
  const fromDB = items.map(x => normalizeL1(x.id.split("-")[0] || "")).filter(Boolean);
  l1Options = Array.from(new Set([...l1Options, ...fromDB])).sort();

  sel.innerHTML = "";
  const placeholder = document.createElement("option");
  placeholder.value = "";
  placeholder.textContent = "Add L1 first";
  sel.appendChild(placeholder);

  l1Options.forEach(v => {
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    sel.appendChild(opt);
  });

  if(selectedValue && l1Options.includes(selectedValue)){
    sel.value = selectedValue;
  }else{
    sel.value = "";
  }

  onL1SelectChange();
}

function addL1Option(){
  const input = document.getElementById("newL1");
  const value = normalizeL1(input.value);

  if(!/^[A-Z]{2}$/.test(value)){
    alert("L1 must be two English letters, such as HM");
    return;
  }

  if(!l1Options.includes(value)){
    l1Options.push(value);
    l1Options.sort();
  }

  input.value = "";
  rebuildL1OptionsFromDB(value);
}

function onL1SelectChange(){
  const l1 = normalizeL1(document.getElementById("l1Select").value);
  const hint = document.getElementById("otHint");
  const idInput = document.getElementById("id");
  const idHint = document.getElementById("idHint");
  const l2 = document.getElementById("l2");
  const l3 = document.getElementById("l3");

  if(l1 === "OT"){
    hint.textContent = "OT is the temporary zone. ID is manual input, for example OT-01.";
    idHint.textContent = "OT uses manual input, for example OT-01.";
    l2.disabled = true;
    l3.disabled = true;
    l2.value = "";
    l3.value = "";
    idInput.readOnly = false;
    idInput.classList.remove("readonly");
    idInput.placeholder = "e.g. OT-01";
    idInput.value = "";
  }else{
    hint.textContent = "";
    idHint.textContent = "Standard format: L1-L2-L3-L4. ID is generated automatically after L1-L3 are complete.";
    l2.disabled = false;
    l3.disabled = false;
    idInput.readOnly = true;
    idInput.classList.add("readonly");
    idInput.placeholder = "e.g. HM-01-01-0001";
  }

  updateID();
}

function nowText(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  const hh = String(d.getHours()).padStart(2,"0");
  const mm = String(d.getMinutes()).padStart(2,"0");
  const ss = String(d.getSeconds()).padStart(2,"0");
  return `${y}-${m}-${day} ${hh}:${mm}:${ss}`;
}

function getAllItems(){
  if(!db) return [];

  const res = db.exec(`
    SELECT
      id, title, ownership, relation, type, created_at,
      cefr, difficulty, status, link, apa, info, notes, tags
    FROM items
  `);

  if(!res.length) return [];

  return res[0].values.map(row => ({
    id: row[0] || "",
    title: row[1] || "",
    ownership: row[2] || "",
    relation: row[3] || "",
    type: row[4] || "",
    created_at: row[5] || "",
    cefr: row[6] || "",
    difficulty: row[7] || "",
    status: row[8] || "",
    link: row[9] || "",
    apa: row[10] || "",
    info: row[11] || "",
    notes: row[12] || "",
    tags: row[13] || ""
  }));
}

function parseIDForSort(id){
  if(/^OT-\d{2}$/.test(id)){
    const n = parseInt(id.split("-")[1], 10);
    return { group:-1, l1:"OT", l2:0, l3:0, l4:isNaN(n)?0:n };
  }

  const m = id.match(/^([A-Z]{2})-(\d{2})-(\d{2})-(\d{4})$/);
  if(m){
    return {
      group:0,
      l1:m[1],
      l2:parseInt(m[2],10),
      l3:parseInt(m[3],10),
      l4:parseInt(m[4],10)
    };
  }

  return { group:9, l1:id, l2:0, l3:0, l4:0 };
}

function sortItemsByID(items){
  return items.sort((a,b)=>{
    const A = parseIDForSort(a.id);
    const B = parseIDForSort(b.id);
    if(A.group !== B.group) return A.group - B.group;
    if(A.l1 !== B.l1) return A.l1.localeCompare(B.l1);
    if(A.l2 !== B.l2) return A.l2 - B.l2;
    if(A.l3 !== B.l3) return A.l3 - B.l3;
    if(A.l4 !== B.l4) return A.l4 - B.l4;
    return a.title.localeCompare(b.title);
  });
}

function getGroupKey(item){
  if(/^OT-\d{2}$/.test(item.id)){
    return { l1:"OT", l2:null, label1:"OT", label2:null };
  }

  const m = item.id.match(/^([A-Z]{2})-(\d{2})-(\d{2})-(\d{4})$/);
  if(m){
    return {
      l1:m[1],
      l2:m[2],
      label1:m[1],
      label2:`${m[1]}-${m[2]}`
    };
  }

  return { l1:"OTHER", l2:null, label1:"OTHER", label2:null };
}

function nextSerialFor(l1, l2, l3){
  if(!db) return "0001";

  const prefix = `${l1}-${l2}-${l3}-`;
  const items = getAllItems().filter(x => x.id.startsWith(prefix));

  let maxNum = 0;
  items.forEach(item => {
    const parts = item.id.split("-");
    if(parts.length === 4){
      const n = parseInt(parts[3], 10);
      if(!isNaN(n) && n > maxNum) maxNum = n;
    }
  });

  return String(maxNum + 1).padStart(4, "0");
}

function updateID(){
  const l1 = normalizeL1(document.getElementById("l1Select").value);
  const l2 = document.getElementById("l2").value.trim();
  const l3 = document.getElementById("l3").value.trim();
  const idInput = document.getElementById("id");

  if(!idInput) return;

  if(!l1){
    idInput.value = "";
    return;
  }

  if(l1 === "OT"){
    return;
  }

  if(!/^\d{2}$/.test(l2) || !/^\d{2}$/.test(l3)){
    idInput.value = "";
    return;
  }

  idInput.value = `${l1}-${l2}-${l3}-${nextSerialFor(l1, l2, l3)}`;
}

function isValidID(id){
  return /^[A-Z]{2}-\d{2}-\d{2}-\d{4}$/.test(id) || /^OT-\d{2}$/.test(id);
}

function add(){
  if(!db){
    alert("Please create or load a database first.");
    return;
  }

  const title = document.getElementById("title").value.trim();
  const id = document.getElementById("id").value.trim().toUpperCase();
  const l1 = normalizeL1(document.getElementById("l1Select").value);
  const l2 = document.getElementById("l2").value.trim();
  const l3 = document.getElementById("l3").value.trim();

  const ownership = document.getElementById("ownership").value;
  const relation = document.getElementById("relation").value;
  const type = document.getElementById("type").value;
  const cefr = document.getElementById("cefr").value;
  const difficulty = document.getElementById("difficulty").value;
  const status = document.getElementById("status").value;
  const link = document.getElementById("link").value.trim();
  const apa = document.getElementById("apa").value.trim();
  const info = document.getElementById("info").value.trim();
  const notes = document.getElementById("notes").value.trim();
  const tags = document.getElementById("tags").value.trim();

  if(!title || !id || !ownership || !relation || !type){
    alert("Required fields: Title / ID / Ownership / Relation / Type");
    return;
  }

  if(!l1){
    alert("Please select or add L1 first.");
    return;
  }

  if(l1 !== "OT"){
    if(!/^\d{2}$/.test(l2)){
      alert("L2 must be two digits, such as 01");
      return;
    }
    if(!/^\d{2}$/.test(l3)){
      alert("L3 must be two digits, such as 01");
      return;
    }
  }

  if(!isValidID(id)){
    alert("ID must be in the format HM-01-01-0001, or OT-01 for the temporary zone.");
    return;
  }

  const created_at = nowText();

  try{
    db.run(
      `INSERT INTO items (
        id, title, ownership, relation, type, created_at,
        cefr, difficulty, status, link, apa, info, notes, tags
      ) VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?)`,
      [
        id, title, ownership, relation, type, created_at,
        cefr, difficulty, status, link, apa, info, notes, tags
      ]
    );
  }catch(err){
    alert("Insert failed. The ID may already exist.\n\n" + err.message);
    return;
  }

  clearFormKeepStructure();
  rebuildL1OptionsFromDB();
  renderList();
  clearEditor();
  updateID();
}

function clearFormKeepStructure(){
  document.getElementById("title").value = "";
  document.getElementById("ownership").value = "";
  document.getElementById("relation").value = "";
  document.getElementById("type").value = "";
  document.getElementById("cefr").value = "";
  document.getElementById("difficulty").value = "";
  document.getElementById("status").value = "";
  document.getElementById("link").value = "";
  document.getElementById("apa").value = "";
  document.getElementById("info").value = "";
  document.getElementById("notes").value = "";
  document.getElementById("tags").value = "";

  if(document.getElementById("l1Select").value === "OT"){
    document.getElementById("id").value = "";
  }else{
    document.getElementById("l2").value = "";
    document.getElementById("l3").value = "";
    document.getElementById("id").value = "";
  }
}

function renderList(){
  if(!db){
    document.getElementById("list").innerHTML = '<div class="small">No database loaded.</div>';
    return;
  }

  let items = getAllItems();
  const q = document.getElementById("search").value.toLowerCase().trim();

  if(q){
    items = items.filter(item => {
      const text = [item.title, item.id, item.tags, item.info, item.notes, item.apa].join(" ").toLowerCase();
      return text.includes(q);
    });
  }

  items = sortItemsByID(items);

  if(!items.length){
    document.getElementById("list").innerHTML = '<div class="empty">No result.</div>';
    return;
  }

  let html = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>ID</th>
            <th>Tags</th>
            <th>Creation time</th>
          </tr>
        </thead>
        <tbody>
  `;

  let currentL1 = null;
  let currentL2 = null;

  items.forEach(item => {
    const g = getGroupKey(item);

    if(g.l1 !== currentL1){
      currentL1 = g.l1;
      currentL2 = null;
      html += `<tr class="group-row"><td colspan="4">${escapeHtml(g.label1)}</td></tr>`;
    }

    if(g.label2 && g.l2 !== currentL2){
      currentL2 = g.l2;
      html += `<tr class="subgroup-row"><td colspan="4">${escapeHtml(g.label2)}</td></tr>`;
    }

    html += `
      <tr>
        <td class="title-cell">
          <span class="title-link" onclick="openEditor(${JSON.stringify(item.id)})">${escapeHtml(item.title || "")}</span>
        </td>
        <td>${escapeHtml(item.id || "")}</td>
        <td class="tags-cell">${escapeHtml(item.tags || "")}</td>
        <td class="time-cell">${escapeHtml(item.created_at || "")}</td>
      </tr>
    `;
  });

  html += `</tbody></table></div>`;
  document.getElementById("list").innerHTML = html;
}

function openEditor(id){
  const item = getAllItems().find(x => x.id === id);
  if(!item) return;

  currentEditId = id;
  document.getElementById("editorArea").innerHTML = `
    <div class="row">
      <label>Title<span class="req">*</span></label>
      <input id="edit_title" value="${escapeAttr(item.title)}">
    </div>

    <div class="grid2">
      <div class="row">
        <label>ID<span class="req">*</span></label>
        <input id="edit_id" value="${escapeAttr(item.id)}" readonly class="readonly">
      </div>

      <div class="row">
        <label>Creation time</label>
        <input id="edit_created_at" value="${escapeAttr(item.created_at)}" readonly class="readonly">
      </div>
    </div>

    <div class="grid2">
      <div class="row">
        <label>Ownership<span class="req">*</span></label>
        <select id="edit_ownership">
          <option value="">Select</option>
          <option value="mine">mine</option>
          <option value="other">other</option>
          <option value="collaborative">collaborative</option>
          <option value="unknown">unknown</option>
        </select>
      </div>

      <div class="row">
        <label>Relation<span class="req">*</span></label>
        <select id="edit_relation">
          <option value="">Select</option>
          <option value="commissioned">commissioned</option>
          <option value="general">general</option>
          <option value="personal">personal</option>
          <option value="work">work</option>
        </select>
      </div>
    </div>

    <div class="grid2">
      <div class="row">
        <label>Type<span class="req">*</span></label>
        <select id="edit_type">
          <option value="">Select</option>
          <option value="work">work</option>
          <option value="tutorial">tutorial</option>
          <option value="reference">reference</option>
          <option value="note">note</option>
        </select>
      </div>

      <div class="row">
        <label>CEFR</label>
        <select id="edit_cefr">
          <option value="">Blank</option>
          <option value="A1">A1</option>
          <option value="A2">A2</option>
          <option value="B1">B1</option>
          <option value="B2">B2</option>
          <option value="C1">C1</option>
          <option value="C2">C2</option>
        </select>
      </div>
    </div>

    <div class="grid2">
      <div class="row">
        <label>Difficulty</label>
        <select id="edit_difficulty">
          <option value="">Blank</option>
          <option value="beginner">beginner</option>
          <option value="intermediate">intermediate</option>
          <option value="advanced">advanced</option>
        </select>
      </div>

      <div class="row">
        <label>Status</label>
        <select id="edit_status">
          <option value="">Blank</option>
          <option value="planned">planned</option>
          <option value="in_progress">in_progress</option>
          <option value="completed">completed</option>
          <option value="abandoned">abandoned</option>
        </select>
      </div>
    </div>

    <div class="row">
      <label>Links</label>
      <input id="edit_link" value="${escapeAttr(item.link)}">
    </div>

    <div class="row">
      <label>APA style</label>
      <textarea id="edit_apa">${escapeHtml(item.apa)}</textarea>
    </div>

    <div class="row">
      <label>Info</label>
      <textarea id="edit_info">${escapeHtml(item.info)}</textarea>
    </div>

    <div class="row">
      <label>Notes</label>
      <textarea id="edit_notes">${escapeHtml(item.notes)}</textarea>
    </div>

    <div class="row">
      <label>Tags</label>
      <input id="edit_tags" value="${escapeAttr(item.tags)}">
    </div>

    <button onclick="saveEditor()">Save changes</button>
    <button onclick="clearEditor()">Close</button>
    <div id="edit_msg" class="small"></div>
  `;

  document.getElementById("edit_ownership").value = item.ownership;
  document.getElementById("edit_relation").value = item.relation;
  document.getElementById("edit_type").value = item.type;
  document.getElementById("edit_cefr").value = item.cefr;
  document.getElementById("edit_difficulty").value = item.difficulty;
  document.getElementById("edit_status").value = item.status;
}

function saveEditor(){
  if(!db || !currentEditId) return;

  const payload = {
    id: document.getElementById("edit_id").value.trim(),
    title: document.getElementById("edit_title").value.trim(),
    ownership: document.getElementById("edit_ownership").value,
    relation: document.getElementById("edit_relation").value,
    type: document.getElementById("edit_type").value,
    created_at: document.getElementById("edit_created_at").value.trim(),
    cefr: document.getElementById("edit_cefr").value,
    difficulty: document.getElementById("edit_difficulty").value,
    status: document.getElementById("edit_status").value,
    link: document.getElementById("edit_link").value.trim(),
    apa: document.getElementById("edit_apa").value.trim(),
    info: document.getElementById("edit_info").value.trim(),
    notes: document.getElementById("edit_notes").value.trim(),
    tags: document.getElementById("edit_tags").value.trim()
  };

  if(!payload.title || !payload.id || !payload.ownership || !payload.relation || !payload.type){
    document.getElementById("edit_msg").textContent = "Required fields: Title / ID / Ownership / Relation / Type";
    return;
  }

  try{
    db.run(
      `UPDATE items SET
        title = ?,
        ownership = ?,
        relation = ?,
        type = ?,
        created_at = ?,
        cefr = ?,
        difficulty = ?,
        status = ?,
        link = ?,
        apa = ?,
        info = ?,
        notes = ?,
        tags = ?
      WHERE id = ?`,
      [
        payload.title,
        payload.ownership,
        payload.relation,
        payload.type,
        payload.created_at,
        payload.cefr,
        payload.difficulty,
        payload.status,
        payload.link,
        payload.apa,
        payload.info,
        payload.notes,
        payload.tags,
        payload.id
      ]
    );

    document.getElementById("edit_msg").textContent = "Saved.";
    renderList();
  }catch(err){
    console.error(err);
    document.getElementById("edit_msg").textContent = "Save failed.";
  }
}

function clearEditor(){
  currentEditId = null;
  document.getElementById("editorArea").innerHTML = "Select a title to view and edit.";
}

function exportDB(){
  if(!db){
    alert("No database to download.");
    return;
  }

  const data = db.export();
  const blob = new Blob([data], {type:"application/octet-stream"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "catalog.db";
  a.click();
}

function escapeHtml(str){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function escapeAttr(str){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/"/g,"&quot;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}
</script>
