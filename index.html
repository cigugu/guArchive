<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Reference Catalog</title>
<script src="sql-wasm.js"></script>

<style>
body{
  font-family: monospace;
  background:#f5f5f5;
  margin:0;
  padding:16px;
  color:#111;
}

.wrap{
  max-width:900px;
  margin:0 auto;
}

h1{
  font-size:24px;
  margin:0 0 16px 0;
}

.box{
  background:#fff;
  border:1px solid #222;
  padding:12px;
  margin-bottom:14px;
}

.row{
  margin-bottom:10px;
}

label{
  display:block;
  font-weight:bold;
  margin-bottom:4px;
}

input, textarea, select{
  width:100%;
  box-sizing:border-box;
  font-family:monospace;
  border:1px solid #999;
  padding:8px;
  background:#fff;
}

textarea{
  min-height:90px;
  resize:vertical;
}

button{
  font-family:monospace;
  border:1px solid #222;
  background:#fff;
  padding:8px 10px;
  cursor:pointer;
  margin:4px 6px 4px 0;
}

button:hover{
  background:#f0f0f0;
}

.small{
  font-size:12px;
  color:#666;
  margin-top:6px;
}

.item{
  border-bottom:1px solid #ddd;
  padding:10px 6px;
  cursor:pointer;
}

.item:last-child{
  border-bottom:none;
}

.item:hover{
  background:#f3f3f3;
}

.item-title{
  font-weight:bold;
  margin-bottom:4px;
}

.item-meta{
  font-size:12px;
  color:#555;
  line-height:1.6;
}

.hidden{
  display:none;
}

.detail-title{
  font-size:20px;
  font-weight:bold;
  margin-bottom:12px;
}

.section-title{
  font-weight:bold;
  margin:14px 0 8px 0;
}

.detail-block{
  margin-bottom:10px;
}

.detail-line{
  margin-bottom:6px;
  line-height:1.6;
}

.inline-label{
  font-weight:bold;
}

.empty{
  color:#666;
  font-size:12px;
}

.hr{
  border-top:1px solid #ddd;
  margin:10px 0;
}

@media (min-width: 900px){
  .detailbox{
    min-height:300px;
  }
}
</style>
</head>
<body>
<div class="wrap">

<h1>Personal Reference Catalog</h1>

<div class="box">
  <div><b>Database</b></div>
  <div style="margin-top:8px;">
    <button onclick="createDB()">Create new DB</button>
    <input type="file" id="file" style="margin-top:8px;">
    <button onclick="exportDB()">Download DB</button>
    <button onclick="toggleForm()">Add entry</button>
  </div>
  <div id="state" class="small">engine loading...</div>
</div>

<div id="formBox" class="box hidden">
  <div><b>New Entry</b></div>

  <div class="row">
    <label>Title !!</label>
    <input id="title" placeholder="在此輸入標題">
  </div>

  <div class="row">
    <label>ID !!</label>
    <input id="id" placeholder="例如：W-01-02-0042">
  </div>

  <div class="row">
    <label>Ownership !!</label>
    <select id="ownership">
      <option value="">請選擇</option>
      <option value="mine">mine</option>
      <option value="other">other</option>
      <option value="collaborative">collaborative</option>
      <option value="unknown">unknown</option>
    </select>
  </div>

  <div class="row">
    <label>Relation !!</label>
    <select id="relation">
      <option value="">請選擇</option>
      <option value="commissioned">commissioned</option>
      <option value="general">general</option>
      <option value="personal">personal</option>
      <option value="work">work</option>
    </select>
  </div>

  <div class="row">
    <label>Type !!</label>
    <select id="type">
      <option value="">請選擇</option>
      <option value="work">work</option>
      <option value="tutorial">tutorial</option>
      <option value="reference">reference</option>
      <option value="note">note</option>
    </select>
  </div>

  <div class="row">
    <label>CEFR</label>
    <select id="cefr">
      <option value="">空白</option>
      <option value="A1">A1</option>
      <option value="A2">A2</option>
      <option value="B1">B1</option>
      <option value="B2">B2</option>
      <option value="C1">C1</option>
      <option value="C2">C2</option>
    </select>
  </div>

  <div class="row">
    <label>Difficulty</label>
    <select id="difficulty">
      <option value="">空白</option>
      <option value="beginner">beginner</option>
      <option value="intermediate">intermediate</option>
      <option value="advanced">advanced</option>
    </select>
  </div>

  <div class="row">
    <label>Status</label>
    <select id="status">
      <option value="">空白</option>
      <option value="planned">planned</option>
      <option value="in_progress">in_progress</option>
      <option value="completed">completed</option>
      <option value="abandoned">abandoned</option>
    </select>
  </div>

  <div class="row">
    <label>Links</label>
    <input id="link" placeholder="雲端資料夾連結 / URL">
  </div>

  <div class="row">
    <label>APA style</label>
    <textarea id="apa" placeholder="APA style"></textarea>
  </div>

  <div class="row">
    <label>Info</label>
    <textarea id="info" placeholder="Info"></textarea>
  </div>

  <div class="row">
    <label>Notes</label>
    <textarea id="notes" placeholder="Notes"></textarea>
  </div>

  <div class="row">
    <label>tags</label>
    <input id="tags" placeholder="#tag1 #tag2">
  </div>

  <button onclick="add()">Save</button>
</div>

<div class="box">
  <div><b>Search</b></div>
  <input id="search" placeholder="搜尋 title / id / tags / info / notes / apa" oninput="renderList()" style="margin-top:8px;">
</div>

<div class="box">
  <div><b>Index</b></div>
  <div id="list" class="small">No database loaded.</div>
</div>

<div class="box detailbox">
  <div><b>Detail</b></div>
  <div id="detail" class="small" style="margin-top:8px;">Select an entry.</div>
</div>

</div>

<script>
let SQL;
let db;

initSqlJs({
  locateFile: file => file
}).then(function(sql){
  SQL = sql;
  document.getElementById("state").innerText = "engine ready";
});

function createDB(){
  db = new SQL.Database();

  db.run(`
    CREATE TABLE IF NOT EXISTS items (
      id TEXT PRIMARY KEY,
      title TEXT NOT NULL,
      ownership TEXT NOT NULL,
      relation TEXT NOT NULL,
      type TEXT NOT NULL,
      created_at TEXT NOT NULL,
      cefr TEXT,
      difficulty TEXT,
      status TEXT,
      link TEXT,
      apa TEXT,
      info TEXT,
      notes TEXT,
      tags TEXT
    )
  `);

  renderList();
  clearDetail();
}

document.getElementById("file").onchange = function(){
  const f = this.files[0];
  if(!f) return;

  const r = new FileReader();
  r.onload = function(){
    const data = new Uint8Array(r.result);
    db = new SQL.Database(data);
    renderList();
    clearDetail();
  };
  r.readAsArrayBuffer(f);
};

function toggleForm(){
  document.getElementById("formBox").classList.toggle("hidden");
}

function nowText(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  const hh = String(d.getHours()).padStart(2,"0");
  const mm = String(d.getMinutes()).padStart(2,"0");
  const ss = String(d.getSeconds()).padStart(2,"0");
  return `${y}-${m}-${day} ${hh}:${mm}:${ss}`;
}

function add(){
  if(!db){
    alert("請先建立或載入資料庫");
    return;
  }

  const title = document.getElementById("title").value.trim();
  const id = document.getElementById("id").value.trim();
  const ownership = document.getElementById("ownership").value;
  const relation = document.getElementById("relation").value;
  const type = document.getElementById("type").value;

  const cefr = document.getElementById("cefr").value;
  const difficulty = document.getElementById("difficulty").value;
  const status = document.getElementById("status").value;
  const link = document.getElementById("link").value.trim();
  const apa = document.getElementById("apa").value.trim();
  const info = document.getElementById("info").value.trim();
  const notes = document.getElementById("notes").value.trim();
  const tags = document.getElementById("tags").value.trim();

  if(!title || !id || !ownership || !relation || !type){
    alert("必填欄位：Title / ID / Ownership / Relation / Type");
    return;
  }

  const created_at = nowText();

  try{
    db.run(
      `INSERT INTO items (
        id, title, ownership, relation, type, created_at,
        cefr, difficulty, status, link, apa, info, notes, tags
      ) VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?)`,
      [
        id, title, ownership, relation, type, created_at,
        cefr, difficulty, status, link, apa, info, notes, tags
      ]
    );
  }catch(err){
    alert("新增失敗，可能是 ID 重複。\n\n" + err.message);
    return;
  }

  clearForm();
  renderList();
}

function clearForm(){
  document.getElementById("title").value = "";
  document.getElementById("id").value = "";
  document.getElementById("ownership").value = "";
  document.getElementById("relation").value = "";
  document.getElementById("type").value = "";
  document.getElementById("cefr").value = "";
  document.getElementById("difficulty").value = "";
  document.getElementById("status").value = "";
  document.getElementById("link").value = "";
  document.getElementById("apa").value = "";
  document.getElementById("info").value = "";
  document.getElementById("notes").value = "";
  document.getElementById("tags").value = "";
}

function getAllItems(){
  if(!db) return [];

  const res = db.exec(`
    SELECT
      id, title, ownership, relation, type, created_at,
      cefr, difficulty, status, link, apa, info, notes, tags
    FROM items
    ORDER BY created_at DESC
  `);

  if(!res.length) return [];

  return res[0].values.map(row => ({
    id: row[0] || "",
    title: row[1] || "",
    ownership: row[2] || "",
    relation: row[3] || "",
    type: row[4] || "",
    created_at: row[5] || "",
    cefr: row[6] || "",
    difficulty: row[7] || "",
    status: row[8] || "",
    link: row[9] || "",
    apa: row[10] || "",
    info: row[11] || "",
    notes: row[12] || "",
    tags: row[13] || ""
  }));
}

function renderList(){
  if(!db){
    document.getElementById("list").innerHTML = '<div class="small">No database loaded.</div>';
    return;
  }

  let items = getAllItems();
  const q = document.getElementById("search").value.toLowerCase().trim();

  if(q){
    items = items.filter(item => {
      const text = [
        item.title,
        item.id,
        item.tags,
        item.info,
        item.notes,
        item.apa
      ].join(" ").toLowerCase();
      return text.includes(q);
    });
  }

  if(!items.length){
    document.getElementById("list").innerHTML = '<div class="empty">No result.</div>';
    return;
  }

  let html = "";
  items.forEach(item => {
    html += `
      <div class="item" onclick="showDetailById(${JSON.stringify(item.id)})">
        <div class="item-title">${escapeHtml(item.title || "(untitled)")}</div>
        <div class="item-meta">ID: ${escapeHtml(item.id)}</div>
        <div class="item-meta">tags: ${escapeHtml(item.tags || "")}</div>
        <div class="item-meta">Creation time: ${escapeHtml(item.created_at || "")}</div>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

function showDetailById(id){
  const items = getAllItems();
  const item = items.find(x => x.id === id);
  if(!item) return;

  document.getElementById("detail").innerHTML = `
    <div class="detail-title">${escapeHtml(item.title)}</div>

    <div class="section-title">Status</div>
    <div class="detail-block">
      <div class="detail-line"><span class="inline-label">ID:</span> ${escapeHtml(item.id)}</div>
      <div class="detail-line"><span class="inline-label">Ownership:</span> ${escapeHtml(item.ownership)}</div>
      <div class="detail-line"><span class="inline-label">Relation:</span> ${escapeHtml(item.relation)}</div>
      <div class="detail-line"><span class="inline-label">Type:</span> ${escapeHtml(item.type)}</div>
      <div class="detail-line"><span class="inline-label">Creation time:</span> ${escapeHtml(item.created_at)}</div>
      <div class="detail-line"><span class="inline-label">CEFR:</span> ${escapeHtml(item.cefr)}</div>
      <div class="detail-line"><span class="inline-label">Difficulty:</span> ${escapeHtml(item.difficulty)}</div>
      <div class="detail-line"><span class="inline-label">Status:</span> ${escapeHtml(item.status)}</div>
    </div>

    <div class="hr"></div>

    <div class="section-title">References</div>
    <div class="detail-block">
      <div class="detail-line"><span class="inline-label">Links:</span> ${
        item.link
          ? `<a href="${escapeAttr(item.link)}" target="_blank" rel="noopener noreferrer">open</a>`
          : ""
      }</div>
      <div class="detail-line"><span class="inline-label">APA style:</span><br>${nl2br(escapeHtml(item.apa))}</div>
    </div>

    <div class="hr"></div>

    <div class="section-title">Info</div>
    <div class="detail-block">${nl2br(escapeHtml(item.info))}</div>

    <div class="hr"></div>

    <div class="section-title">Notes</div>
    <div class="detail-block">${nl2br(escapeHtml(item.notes))}</div>

    <div class="hr"></div>

    <div class="section-title">tags</div>
    <div class="detail-block">${escapeHtml(item.tags)}</div>
  `;
}

function clearDetail(){
  document.getElementById("detail").innerHTML = 'Select an entry.';
}

function exportDB(){
  if(!db){
    alert("沒有可下載的資料庫");
    return;
  }

  const data = db.export();
  const blob = new Blob([data], {type:"application/octet-stream"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "catalog.db";
  a.click();
}

function nl2br(str){
  return String(str).replace(/\n/g, "<br>");
}

function escapeHtml(str){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function escapeAttr(str){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/"/g,"&quot;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}
</script>
</body>
</html>
